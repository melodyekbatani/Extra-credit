<head>
	<meta charset="UTF-8"/>
	<title>Field / Structure - extra-credit for Typography and Interaction</title>
	<meta name="description"
	content="Field / Structure is an extra-credit project completed for Typography and Interaction, translating works by Mark Rothko and Kenneth Noland into CSS through a study of color, atmosphere, and structure.">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- FONTS -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet">

	<link href="reset.css" rel="stylesheet">
	<link href="style.css" rel="stylesheet">
	<script defer src="script.js"></script>
</head>

<body>
	<!-- INTRO -->
	<main class="project">
		<header class="intro">
			<h1>Field / Structure</h1>
			<p>
				This project looks at two paintings that use color as a structuring principles. While Rothko's No. 5/No. 22 demonstrates a layered fields of yellow, red, and orange blurring into one another, Noland's New Day shapes color into horizontal bands that stretch across the canvas.
			</p>
		</header>

		<figure class="rothko">
			<div class="artwork rothko">
				<span class="field-top"></span>
				<span class="field-middle"></span>
				<span class="field-bottom"></span>
			</div>
			<figcaption>
				<h2>No. 5/No. 22</h2>
				<div class="tombstone">
					<h3>Mark Rothko</h3>
					<time datetime="1950">1950</time>
					<p>
						Rothko organizes the canvas through horizontal fields with their softened edges used to make the color feel like a suspended atmospheric space.
					</p>
				<a href="https://www.moma.org/collection/works/80566">View original</a>
				</div>
			</figcaption>
		</figure>

		<figure class="noland">
			<div class="artwork noland"></div>
			<figcaption>
				<h2>New Day</h2>
				<div class="tombstone">
					<h3>Kenneth Noland</h3>
					<time datetime="1967">1967</time>
					<p>
						Noland's work is shaped around a field of horizontal bands using color as the key subject, carrying the eye back and forth across a surface.
					</p>
				<a href="https://whitney.org/collection/works/2425">View original</a>
				</div>
			</figcaption>
		</figure>
	</main>
</body>
</html>
