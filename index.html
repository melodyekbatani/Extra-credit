<head>
	<link href="reset.css" rel="stylesheet">
	<link href="style.css" rel="stylesheet">
	<script defer src="script.js"></script>
</head>

<body>
	<main class="project">
		<header class="intro">
			<h1>Field / Structure</h1>

			<p>
				This project is inspired by two mid-century abstract paintings that use
				simplified fields and bands to shape perception in opposite ways. While Mark
				Rothko's piece drives soft, atmospheric color blocks, Carmen Herrera's forms are rigid,
				optical geometry.
			</p>

			<button class="toggle" type="button">
				Shift
			</button>
		</header>

		<section class="works" aria-label="Artwork interpretations">
			<figure class="work rothko">
				<section class="artwork">
					<span class="rothko-work"></span>

					<span class="field-top"></span>
					<span class="field-middle"></span>
					<span class="field-bottom"></span>

					<span class="thread-one"></span>
					<span class="thread-two"></span>
					<span class="thread-three"></span>
				</section>

				<figcaption>

					<h2>
						<cite>No. 5/No. 22</cite>
					</h2>

					<section class="tombstone">
						<h3>Mark Rothko</h3>
						<time datetime="1950">1950</time>
						<p class="description">
						Rothko organizes the canvas through broad horizontal fields of yellow,
						red, and orange. Their softened edges make the color feel suspended,
						turning simple blocks into an atmospheric space.
					</p>
					<a href="https://www.moma.org/collection/works/80566">
						View original
					</a>
					</section>
				</figcaption>
			</figure>

			<figure class="herrera">
				<section class="artwork" aria-label="CSS interpretation of Carmen Herrera's Untitled from 1952">
					<span class="band-one"></span>
					<span class="band-two"></span>
					<span class="band-three"></span>
					<span class="band-four"></span>
					<span class="band-five"></span>
					<span class="band-six"></span>
					<span class="band-seven"></span>
					<span class="band-eight"></span>
					<span class="band-nine"></span>
					<span class="band-ten"></span>

					<span class="plane-left"></span>
					<span class="plane-right"></span>
				</section>

				<figcaption>
					<h2>
						<cite>Untitled</cite>
					</h2>

					<section class="tombstone">
						<h3>Carmen Herrera</h3>
						<time datetime="1952">1952</time>
						<p class="description">
						Herrera builds a strict field of alternating black and white bands,
						then interrupts that order with diagonal shifts, creating strong optical tension.
					</p>
					</section>

					<a href="https://www.moma.org/collection/works/101471" target="_blank" rel="noreferrer">
						View original
					</a>
				</figcaption>
			</figure>
		</section>
	</main>
</body>

</html>
